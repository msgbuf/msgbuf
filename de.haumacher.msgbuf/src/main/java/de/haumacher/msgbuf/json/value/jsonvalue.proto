package de.haumacher.msgbuf.json.value;

option NoInterfaces;
option NoXml;
option NoReflection;
option NoListener;
option NoVisitor;

/**
 * Envelope type representing any JSON value for binary serialization.
 *
 * <p>
 * Note: XML serialization is intentionally disabled (NoXml) because these classes are part of the
 * msgbuf-api runtime library, which must be GWT-compatible. XML serialization would pull in
 * {@code javax.xml.stream.*} (StAX API), which is not available in GWT environments. When JSON
 * fields are serialized over XML, they are encoded as JSON text strings instead (see
 * {@code XmlStreamingPlugin} in the generator).
 * </p>
 */
abstract message JsonValue {
}

/** A JSON string value. */
message JsonString extends JsonValue {
    string value;
}

/** A JSON integer number value (fits in a long). */
message JsonLong extends JsonValue {
    long value;
}

/** A JSON floating-point number value. */
message JsonDouble extends JsonValue {
    double value;
}

/** A JSON boolean value. */
message JsonBoolean extends JsonValue {
    boolean value;
}

/** A JSON null value. */
message JsonNull extends JsonValue {
}

/** A JSON array value. */
message JsonArray extends JsonValue {
    repeated JsonValue elements;
}

/** A JSON object value (ordered map of string keys to JSON values). */
message JsonObject extends JsonValue {
    map<string, JsonValue> entries;
}
